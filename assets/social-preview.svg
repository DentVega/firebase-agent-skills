<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Firebase Agent Skills — Community Firebase skills for AI coding assistants">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFCA28"/>
      <stop offset="60%" stop-color="#FFA000"/>
      <stop offset="100%" stop-color="#F57C00"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.04" stroke="#FFA000" stroke-width="1">
    <path d="M 0 80 H 1280 M 0 160 H 1280 M 0 240 H 1280 M 0 320 H 1280 M 0 400 H 1280 M 0 480 H 1280 M 0 560 H 1280"/>
    <path d="M 80 0 V 640 M 160 0 V 640 M 240 0 V 640 M 320 0 V 640 M 400 0 V 640 M 480 0 V 640 M 560 0 V 640 M 640 0 V 640 M 720 0 V 640 M 800 0 V 640 M 880 0 V 640 M 960 0 V 640 M 1040 0 V 640 M 1120 0 V 640 M 1200 0 V 640"/>
  </g>

  <!-- Logo (translated + scaled) -->
  <g transform="translate(140, 200) scale(1.9)">
    <path d="
      M64 8
      C 70 26, 82 32, 88 48
      C 92 60, 90 70, 84 80
      C 96 76, 104 88, 102 102
      C 100 116, 84 122, 64 122
      C 44 122, 28 116, 26 102
      C 24 88, 32 76, 44 80
      C 38 70, 36 60, 40 48
      C 46 32, 58 26, 64 8 Z"
      fill="url(#flame)"/>
    <path d="
      M64 28
      C 68 42, 76 48, 78 60
      C 80 70, 76 80, 70 88
      C 78 86, 82 94, 80 102
      C 78 110, 70 114, 64 114
      C 58 114, 50 110, 48 102
      C 46 94, 50 86, 58 88
      C 52 80, 48 70, 50 60
      C 52 48, 60 42, 64 28 Z"
      fill="url(#inner)" opacity="0.85"/>
    <circle cx="16"  cy="64" r="3.5" fill="#FFA000"/>
    <circle cx="22"  cy="36" r="2.5" fill="#FFA000"/>
    <circle cx="112" cy="64" r="3.5" fill="#FFA000"/>
    <circle cx="106" cy="36" r="2.5" fill="#FFA000"/>
  </g>

  <!-- Title -->
  <text x="490" y="270" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#FFFFFF">
    Firebase Agent Skills
  </text>

  <!-- Subtitle -->
  <text x="490" y="320" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="30" font-weight="400" fill="#FFA000">
    Production-grade Firebase skills for AI coding assistants
  </text>

  <!-- Tag chips -->
  <g font-family="-apple-system, system-ui, monospace" font-size="20" fill="#E0E0E0">
    <g transform="translate(490, 380)">
      <rect width="120" height="36" rx="18" fill="#212121" stroke="#FFA000" stroke-width="1"/>
      <text x="60" y="24" text-anchor="middle">Claude</text>
    </g>
    <g transform="translate(625, 380)">
      <rect width="120" height="36" rx="18" fill="#212121" stroke="#FFA000" stroke-width="1"/>
      <text x="60" y="24" text-anchor="middle">Cursor</text>
    </g>
    <g transform="translate(760, 380)">
      <rect width="120" height="36" rx="18" fill="#212121" stroke="#FFA000" stroke-width="1"/>
      <text x="60" y="24" text-anchor="middle">Gemini</text>
    </g>
    <g transform="translate(895, 380)">
      <rect width="140" height="36" rx="18" fill="#212121" stroke="#FFA000" stroke-width="1"/>
      <text x="70" y="24" text-anchor="middle">Copilot</text>
    </g>
  </g>

  <!-- Stats row -->
  <g font-family="-apple-system, system-ui, sans-serif" fill="#9E9E9E">
    <g transform="translate(490, 460)">
      <text font-size="52" font-weight="700" fill="#FFFFFF">15</text>
      <text font-size="18" font-weight="500" y="20" x="74" fill="#FFA000">skills</text>
      <text font-size="14" y="44" x="74">Auth · Firestore · Functions · Storage · …</text>
    </g>
    <g transform="translate(750, 460)">
      <text font-size="52" font-weight="700" fill="#FFFFFF">Expo</text>
      <text font-size="18" font-weight="500" y="20" x="140" fill="#FFA000">first</text>
      <text font-size="14" y="44" x="0">React Native · EAS Build · config plugins</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="140" y="600" font-family="-apple-system, system-ui, monospace" font-size="20" fill="#666">
    github.com/DentVega/firebase-agent-skills
  </text>
</svg>
